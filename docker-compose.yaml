services:
  # Development services
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "8090:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: my_mesl7y_app
      POSTGRES_PASSWORD: "1x3WVdzXMLH_vHvf5XvRoJr-Fu9kb1xT"
    volumes:
      - my_mesl7y_app_data:/var/lib/postgresql/data

  redis:
    image: redis:6.2.6
    ports:
      - "8091:6379"
    command: redis-server --requirepass "c-wp2UWO6vgpifqxVJB2Sq0VebnNR2k5"
    environment:
      - REDIS_REPLICATION_MODE=master

  # Test services
  postgres_test:
    image: pgvector/pgvector:pg16
    ports:
      - "9090:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: my_mesl7y_app_test
      POSTGRES_PASSWORD: "8ip9ULDCeuIvYdVjq-0ERJsoVIixEsg4"
    volumes:
      - my_mesl7y_app_test_data:/var/lib/postgresql/data

  redis_test:
    image: redis:6.2.6
    ports:
      - "9091:6379"
    command: redis-server --requirepass "mQrvtvQiKe3zIcSzkASJy7P3UbyPDrr7"
    environment:
      - REDIS_REPLICATION_MODE=master

volumes:
  my_mesl7y_app_data:
  my_mesl7y_app_test_data:
